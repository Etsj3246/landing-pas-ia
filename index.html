<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing PAS IA</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col justify-between">

    <!-- Encabezado / Navbar -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur px-6 py-4 flex justify-between items-center">
        <div class="text-xl font-bold bg-gradient-to-r border-none from-cyan-400 to-blue-500 bg-clip-text text-transparent">
            PAS IA 🤖
        </div>
        <nav class="space-x-6 text-sm font-medium text-slate-400">
            <a href="#" class="hover:text-cyan-400 transition">Inicio</a>
            <a href="#" class="hover:text-cyan-400 transition">Características</a>
        </nav>
    </header>

    <!-- Contenido Principal / Interfaz -->
    <main class="max-w-4xl mx-auto px-6 py-20 text-center flex-grow flex flex-col justify-center items-center">
        <span class="text-xs font-semibold tracking-widest text-cyan-400 uppercase bg-cyan-950/50 border border-cyan-800 px-3 py-1 rounded-full mb-6">
            Próximamente disponible
        </span>
        <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight mb-6 bg-gradient-to-b from-white to-slate-400 bg-clip-text text-transparent">
            Tu Asistente Virtual Inteligente
        </h1>
        <p class="text-lg text-slate-400 max-w-xl mb-10 leading-relaxed">
            Bienvenido a tu Landing Page. Aquí puedes colocar el texto que venía dentro de tu archivo Word para describir las funciones de tu IA.
        </p>
        <div class="flex flex-col sm:flex-row gap-4">
            <button class="bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-semibold px-8 py-3 rounded-lg shadow-lg shadow-cyan-500/20 transition-all">
                Iniciar Comandos
            </button>
            <button class="border border-slate-700 hover:bg-slate-900 text-slate-300 font-semibold px-8 py-3 rounded-lg transition-all">
                Saber más
            </button>
        </div>
    </main>

    <!-- Pie de página -->
    <footer class="border-t border-slate-900 text-center py-6 text-xs text-slate-600">
        &copy; 2026 PAS IA. Todos los derechos reservados.
    </footer>

</body>
</html>
